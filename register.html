<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Island Tech Essentials | Register</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <header>
            <div class="logo"Island Tech Essentials</div>
            <nav>
                <a href="index.html">Home</a>
                <a href="login.html">Login</a>
                <a href="register.html">Register</a>
                <a href="products.html">Products</a>
                <a href="cart.html">Cart</a>
                <a href="checout.html">Checkout</a>
                <a href="about.html">About Us</a>
            </nav>
        </header>

        <main class="form-container">
            <h2>Register</h2>
            <form onsubmit="return validateRegistration()">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" />

                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" />

                <label for="email">Email</label>
                <input type="email" id="email" />

                <label for="regUsername">Username</label>
                <input type="text" id="regUsername" />

                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" />

                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" />

                <button type="submit" class="btn">Register</button>
                <p id="registerMessage"></p>
            </form>
        </main>

        <footer>
            <p>&copy; 2026 Island Tech Essentials. All rights reserved.</p>
        </footer>

        <script src="script.js"></script>
    </body>
</html>
