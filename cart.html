<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Island Tech Essentials | Cart</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body onload="displayCart()">
  <header>
    <div class="logo">Island Tech Essentials</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
      <a href="register.html">Register</a>
      <a href="products.html">Products</a>
      <a href="cart.html">Cart</a>
      <a href="checkout.html">Checkout</a>
      <a href="about.html">About Us</a>
    </nav>
  </header>

  <main class="cart-section">
    <h2>Your Shopping Cart</h2>

    <table>
      <thead>
        <tr>
          <th>Product</th>
          <th>Price</th>
          <th>Quantity</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="cartItems"></tbody>
    </table>

    <div class="summary-box">
      <p>Subtotal: $<span id="subtotal">0.00</span></p>
      <p>Discount (5%): $<span id="discount">0.00</span></p>
      <p>Tax (10%): $<span id="tax">0.00</span></p>
      <h3>Grand Total: $<span id="grandTotal">0.00</span></h3>

      <button class="btn" onclick="clearCart()">Clear All</button>
      <a href="checkout.html" class="btn">Check Out</a>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Island Tech Essentials. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
